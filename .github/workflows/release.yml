name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.1.0). Must already exist.'
        required: true
        type: string

jobs:
  pack:
    name: Pack ${{ matrix.platform }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            platform: darwin
            arch: arm64
          - host: macos-13
            platform: darwin
            arch: x64
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0

      - name: Install dependencies
        run: bun install

      - name: Verify native addon binary
        run: |
          set -euo pipefail
          # bun install's postinstall runs scripts/download-binary.js for native-rs.
          # That script writes ANY HTTP response body (including 404 "Not Found")
          # to the .node file without checking status code. Reject placeholder
          # files early so we don't ship a broken archive.
          case "${{ matrix.arch }}" in
            arm64) NATIVE_BIN=glimpse-tty-native-rs.${{ matrix.platform }}-arm64.node ;;
            x64)   NATIVE_BIN=glimpse-tty-native-rs.${{ matrix.platform }}-x64.node ;;
          esac
          BIN_PATH="glimpse-tty-native-rs/${NATIVE_BIN}"
          if [[ ! -f "$BIN_PATH" ]]; then
            echo "Missing $BIN_PATH"
            exit 1
          fi
          SIZE=$(stat -f %z "$BIN_PATH" 2>/dev/null || stat -c %s "$BIN_PATH")
          if [[ "$SIZE" -lt 10000 ]]; then
            echo "Native addon binary at $BIN_PATH is suspiciously small ($SIZE bytes)."
            echo "This usually means GitHub returned 404 for the release asset."
            echo "Ensure the native-rs CD workflow has published binaries for this version:"
            node -p "'glimpse-tty-native-rs version: ' + require('./glimpse-tty-native-rs/package.json').version"
            head -c 200 "$BIN_PATH"
            exit 1
          fi
          echo "Native addon binary OK: $BIN_PATH ($SIZE bytes)"

      - name: Resolve version from tag
        id: version
        run: |
          set -euo pipefail
          TAG_REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG_REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Pack distribution
        env:
          GLIMPSE_TTY_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/pack.sh

      - name: Compute archive metadata
        id: archive
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="glimpse-tty-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          ARCHIVE_PATH="build/${ARCHIVE}"
          test -f "$ARCHIVE_PATH" || { echo "Missing archive: $ARCHIVE_PATH"; exit 1; }
          SHA256=$(shasum -a 256 "$ARCHIVE_PATH" | awk '{print $1}')
          echo "$SHA256  $ARCHIVE" > "${ARCHIVE_PATH}.sha256"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "archive_path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive }}
          path: |
            ${{ steps.archive.outputs.archive_path }}
            ${{ steps.archive.outputs.archive_path }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - pack
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create or update Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          artifacts: 'artifacts/*.tar.gz,artifacts/*.tar.gz.sha256'
          allowUpdates: true
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
